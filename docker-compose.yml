# GPU: this image is CPU-only (BM25 + HTTP). For LLM GPU, run Ollama with CUDA/ROCm on the
# host and set OLLAMA_NUM_GPU in .env. For embedding precompute with GPU, run save_embeddings.py on the host.
services:
  rag-cyber-assistant:
    build: .
    container_name: rag-cyber-assistant
    network_mode: host
    working_dir: /app
    command: python3 rag_cyber_assistant.py
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      - ./:/app

  # HTTP API: POST /chat — konfiguracja LLM z .env (OPENAI_* lub OLLAMA_*).
  rag-api:
    build: .
    container_name: rag-cyber-assistant-api
    working_dir: /app
    command: uvicorn rag_api:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./:/app
