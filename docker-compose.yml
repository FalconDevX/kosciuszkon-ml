services:
  rag-cyber-assistant:
    build: .
    container_name: rag-cyber-assistant
    network_mode: host
    working_dir: /app
    command: python3 rag_cyber_assistant.py
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      - ./:/app

  rag-api:
    build: .
    container_name: rag-cyber-assistant-api
    working_dir: /app
    command: uvicorn rag_api:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./:/app
